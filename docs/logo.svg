<svg width="820" height="180" viewBox="0 0 820 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dockerGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2496ED"/>
      <stop offset="100%" stop-color="#0B5FFF"/>
    </linearGradient>

    <linearGradient id="phpGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#777BB3"/>
      <stop offset="100%" stop-color="#5A67D8"/>
    </linearGradient>

    <linearGradient id="lampGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#E95420"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="180" rx="28" fill="#0F172A"/>

  <!-- Docker-inspired containers -->
  <g transform="translate(40 40)" filter="url(#shadow)">

    <!-- Main container -->
    <rect x="0" y="18" width="72" height="48" rx="10" fill="url(#dockerGradient)"/>

    <!-- Small containers -->
    <rect x="78" y="0" width="24" height="24" rx="6" fill="#2496ED"/>
    <rect x="108" y="0" width="24" height="24" rx="6" fill="#2496ED"/>
    <rect x="138" y="0" width="24" height="24" rx="6" fill="#2496ED"/>

    <rect x="78" y="30" width="24" height="24" rx="6" fill="#2496ED"/>
    <rect x="108" y="30" width="24" height="24" rx="6" fill="#2496ED"/>
    <rect x="138" y="30" width="24" height="24" rx="6" fill="#2496ED"/>

    <!-- Whale base -->
    <path d="M0 72C18 90 48 100 82 100C118 100 148 92 168 74H0V72Z" fill="#2496ED"/>
  </g>

  <!-- Main title -->
  <g transform="translate(250 72)">
    <text x="0" y="0"
          font-family="Inter, Arial, sans-serif"
          font-size="52"
          font-weight="800"
          fill="white">
      Docker
    </text>

    <text x="205" y="0"
          font-family="Inter, Arial, sans-serif"
          font-size="52"
          font-weight="800"
          fill="url(#lampGradient)">
      LAMP
    </text>

    <rect x="390" y="-38" width="54" height="28" rx="14" fill="#10B981"/>

    <text x="405" y="-18"
          font-family="Inter, Arial, sans-serif"
          font-size="16"
          font-weight="700"
          fill="white">
      v2
    </text>
  </g>

  <!-- Subtitle -->
  <g transform="translate(252 112)">
    <text x="0" y="0"
          font-family="Inter, Arial, sans-serif"
          font-size="18"
          font-weight="500"
          fill="#CBD5E1">
      Multi-PHP Runtime Platform
    </text>
  </g>

  <!-- Runtime badges -->
  <g transform="translate(252 132)">

    <rect x="0" y="0" width="72" height="26" rx="13" fill="#1E293B" stroke="#334155"/>
    <text x="18" y="17"
          font-family="Inter, Arial, sans-serif"
          font-size="13"
          font-weight="700"
          fill="#F8FAFC">
      PHP 5.6
    </text>

    <rect x="84" y="0" width="72" height="26" rx="13" fill="#1E293B" stroke="#334155"/>
    <text x="102" y="17"
          font-family="Inter, Arial, sans-serif"
          font-size="13"
          font-weight="700"
          fill="#F8FAFC">
      PHP 7.4
    </text>

    <rect x="168" y="0" width="72" height="26" rx="13" fill="#1E293B" stroke="#334155"/>
    <text x="186" y="17"
          font-family="Inter, Arial, sans-serif"
          font-size="13"
          font-weight="700"
          fill="#F8FAFC">
      PHP 8.5
    </text>

    <rect x="254" y="0" width="118" height="26" rx="13" fill="#102A43" stroke="#2496ED"/>
    <text x="272" y="17"
          font-family="Inter, Arial, sans-serif"
          font-size="13"
          font-weight="700"
          fill="#7DD3FC">
      Multi Runtime
    </text>

    <rect x="386" y="0" width="82" height="26" rx="13" fill="#2D1B69" stroke="#777BB3"/>
    <text x="406" y="17"
          font-family="Inter, Arial, sans-serif"
          font-size="13"
          font-weight="700"
          fill="#C4B5FD">
      ionCube
    </text>
  </g>
</svg>