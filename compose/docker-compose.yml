services:
  apache:
    build:
      context: ..
      dockerfile: docker/apache/Dockerfile

    container_name: docker-lamp-apache

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ../app:/var/www/html

    depends_on:
      - php56
      - php74
      - php85

    networks:
      - lamp

  php56:
    build:
      context: ..
      dockerfile: docker/php56/Dockerfile

    container_name: docker-lamp-php56

    restart: unless-stopped

    volumes:
      - ../app:/var/www/html
      - ../docker/php56/php.ini:/usr/local/etc/php/conf.d/custom.ini

    networks:
      - lamp

  php74:
    build:
      context: ..
      dockerfile: docker/php74/Dockerfile

    container_name: docker-lamp-php74

    restart: unless-stopped

    volumes:
      - ../app:/var/www/html
      - ../docker/php74/php.ini:/etc/php/7.4/fpm/conf.d/99-custom.ini

    networks:
      - lamp

  php85:
    build:
      context: ..
      dockerfile: docker/php85/Dockerfile

    container_name: docker-lamp-php85

    restart: unless-stopped

    volumes:
      - ../app:/var/www/html
      - ../docker/php85/php.ini:/etc/php/8.5/fpm/conf.d/99-custom.ini

    networks:
      - lamp

  db:
    image: mariadb:11

    container_name: docker-lamp-db

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app

    ports:
      - "3306:3306"

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=1000

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - lamp

  phpmyadmin:
    image: phpmyadmin:latest

    container_name: docker-lamp-pma

    restart: unless-stopped

    ports:
      - "8080:80"

    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
      UPLOAD_LIMIT: 512M

    depends_on:
      - db

    networks:
      - lamp

  postgres:
    image: postgres:17

    container_name: docker-lamp-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: app
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root

    ports:
      - "5432:5432"

    command:
      - postgres
      - -c
      - max_connections=300
      - -c
      - shared_buffers=256MB

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - lamp

  pgadmin:
    image: dpage/pgadmin4:latest

    container_name: docker-lamp-pgadmin

    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: root
      PGADMIN_CONFIG_SERVER_MODE: "False"

    ports:
      - "8081:80"

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    depends_on:
      - postgres

    networks:
      - lamp

  redis:
    image: redis:7-alpine

    container_name: docker-lamp-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    command:
      - redis-server
      - --appendonly
      - "yes"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - lamp

volumes:
  mysql_data:
  postgres_data:
  pgadmin_data:
  redis_data:

networks:
  lamp:
    driver: bridge